<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hot Station</title>

  <link href="https://fonts.googleapis.com/css2?family=Luckiest+Guy&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<header class="topo">
  <div class="logo-area">
    <img src="https://via.placeholder.com/60" class="logo" alt="Logo">
    <h1>Hot Station</h1>
  </div>

  <div class="login">
    <button class="btn">Login</button>
    <button class="btn">Cadastro</button>
    <input id="busca" type="text" placeholder="Buscar hambúrguer">
  </div>
</header>

<h2>Cardápio</h2>

<section class="cardapio">

  <div class="item">
    <img src="https://via.placeholder.com/300x150" alt="X-Salada">
    <h3>X-Salada</h3>
    <p class="preco">R$ 25,00</p>
    <button class="btn comprar">Comprar</button>
  </div>

  <div class="item">
    <img src="https://via.placeholder.com/300x150" alt="X-Burguer">
    <h3>X-Burguer</h3>
    <p class="preco">R$ 30,00</p>
    <button class="btn comprar">Comprar</button>
  </div>

  <div class="item">
    <img src="https://via.placeholder.com/300x150" alt="X-Alcatra">
    <h3>X-Alcatra</h3>
    <p class="preco">R$ 20,00</p>
    <button class="btn comprar">Comprar</button>
  </div>

  <div class="item">
    <img src="https://via.placeholder.com/300x150" alt="X-Coração">
    <h3>X-Coração</h3>
    <p class="preco">R$ 28,00</p>
    <button class="btn comprar">Comprar</button>
  </div>

</section>

<script src="script.js"></script>
</body>
</html>
